<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e427b" />

    <title>Ark Solutions</title>
    <meta
      name="description"
      content="Custom-fit AI automation, build-to-own software, and competitive intelligence systems for growing businesses. Free consultation — no obligation."
    />
    <link rel="canonical" href="https://arksolutions.ai/" />

    <!-- Favicons: PNG only (no /favicon.svg in public — a missing SVG was winning in some browsers) -->
    <link rel="icon" type="image/png" href="/coreNOBACKGROUND.png" />
    <link rel="apple-touch-icon" href="/coreNOBACKGROUND.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ark Solutions" />
    <meta property="og:title" content="arksolutions.ai" />
    <meta
      property="og:description"
      content="Custom-fit AI automation, build-to-own software, and competitive intelligence systems for growing businesses."
    />
    <meta property="og:url" content="https://arksolutions.ai/" />
    <meta property="og:image" content="https://arksolutions.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ark Solutions" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="arksolutions.ai" />
    <meta
      name="twitter:description"
      content="Custom-fit AI automation, build-to-own software, and competitive intelligence systems for growing businesses."
    />
    <meta name="twitter:image" content="https://arksolutions.ai/og-image.png" />
    <meta name="twitter:image:alt" content="Ark Solutions" />

    <!-- Preconnect for fonts (most impactful perf hint for LCP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Syne:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preconnect to Cal.com (booking embed) -->
    <link rel="dns-prefetch" href="https://cal.com" />
    <link rel="preconnect" href="https://cal.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
